<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Large Rod of Asclepius (Äskulapstab) for Asklepios right panel -->
  <!-- Dark circle background -->
  <circle cx="200" cy="200" r="170" fill="rgba(0,0,0,0.35)"/>

  <g transform="translate(200, 200)" opacity="0.55">
    <!-- Staff (vertical rod) -->
    <line x1="0" y1="-130" x2="0" y2="130" stroke="white" stroke-width="10" stroke-linecap="round"/>

    <!-- Serpent winding around the staff -->
    <!-- Snake body segments (s-curves around the rod) -->
    <path d="M0 110 
             C 35 100, 45 80, 30 65 
             C 15 50, -15 50, -30 35 
             C -45 20, -45 0, -30 -15 
             C -15 -30, 15 -30, 30 -45 
             C 45 -60, 45 -80, 30 -90 
             C 15 -100, 0 -95, -10 -85" 
          stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Snake head -->
    <ellipse cx="-16" cy="-82" rx="14" ry="10" fill="white" opacity="0.7" transform="rotate(-20, -16, -82)"/>
    <!-- Snake eye -->
    <circle cx="-12" cy="-85" r="2.5" fill="rgba(0,0,0,0.5)"/>

    <!-- Staff top knob -->
    <circle cx="0" cy="-130" r="8" fill="white" opacity="0.4"/>
  </g>
</svg>
